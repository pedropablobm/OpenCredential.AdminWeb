services:
  postgres:
    image: postgres:16-alpine
    container_name: opencredential-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opencredential_admin
      POSTGRES_USER: opencredential
      POSTGRES_PASSWORD: opencredential_secure
    volumes:
      - opencredential_postgres_data:/var/lib/postgresql/data

  opencredential-adminweb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencredential-adminweb
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      AdminAuth__Username: admin
      AdminAuth__Password: AdminWeb2026!
      AdminAuth__Role: SuperAdmin
      Database__Mode: Sql
      Database__Provider: PostgreSql
      Database__ConnectionString: Host=postgres;Port=5432;Database=opencredential_admin;Username=opencredential;Password=opencredential_secure;Include Error Detail=true
      Database__AutoInitialize: "true"
    volumes:
      - opencredential_adminweb_data:/data

volumes:
  opencredential_postgres_data:
  opencredential_adminweb_data:
